spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

vintage-hub:
  crawl:
    request-delay-ms: 1000

logging:
  structured:
    format:
      console: logstash
  level:
    com.joypeb.vintagehub: DEBUG
