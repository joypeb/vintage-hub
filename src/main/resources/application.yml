spring:
  application:
    name: vintage-hub-be
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

vintage-hub:
  crawl:
    schedule:
      enabled: true
      fixed-rate: 1h
      site-codes:
        - rocketsalad
  admin:
    password-hash-api-enabled: ${VINTAGE_HUB_ADMIN_PASSWORD_HASH_API_ENABLED:false}
  jwt:
    secret: ${VINTAGE_HUB_JWT_SECRET:}
    access-token-validity-seconds: ${VINTAGE_HUB_JWT_ACCESS_TOKEN_VALIDITY_SECONDS:1800}
  product:
    availability-check:
      enabled: true
      fixed-rate: 10m
      batch-size: 20
      max-parallel-sites: 3
      request-delay: 1s
      available-ttl: 6h
      sold-out-ttl: 7d
      unknown-ttl: 1h
      check-failed-ttl: 2h
